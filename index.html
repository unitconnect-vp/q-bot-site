<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q렌즈 — 보이는 것 너머를 묻습니다</title>
  <meta name="description" content="전략·분석, 금융·투자, 사회·이슈, 데이터·인사이트. 보이는 것 너머를 묻는 롱폼 아티클.">
  <link rel="canonical" href="https://q-bot.kr/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Q렌즈 — 보이는 것 너머를 묻습니다">
  <meta property="og:description" content="전략·분석, 금융·투자, 사회·이슈, 데이터·인사이트.">
  <meta property="og:image" content="https://q-bot.kr/assets/og-default.webp">
  <meta property="og:url" content="https://q-bot.kr/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1015415940515156" crossorigin="anonymous"></script>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-logo">Q<span>-</span>Lens</a>
    <nav class="site-nav">
      <a href="/">홈</a>
      <a href="/articles/">아티클</a>
      <a href="https://heyqbot.github.io/qlens-tools/" target="_blank">계산기</a>
    </nav>
  </header>

  <main class="feed-wrap">
    <div id="feed-featured" class="feed-featured"></div>

    <p class="feed-section-title">최근 아티클</p>
    <div id="feed-recent" class="feed-recent"></div>

    <p class="feed-section-title">계산기</p>
    <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:1.5rem;margin-bottom:3rem;">
      <p style="font-size:0.9rem;color:#6b7280;margin-bottom:1rem;">연봉·세금·투자 계산기 모음</p>
      <a href="https://heyqbot.github.io/qlens-tools/" target="_blank"
         style="display:inline-block;background:#16a34a;color:#fff;padding:0.6rem 1.2rem;border-radius:3px;font-size:0.85rem;font-family:Inter,sans-serif;font-weight:700;">
        계산기 허브 열기 →
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Q렌즈 · <a href="/">q-bot.kr</a> · 보이는 것 너머를 묻습니다</p>
  </footer>

  <script>
    fetch('/articles/articles.json')
      .then(r => r.json())
      .then(articles => {
        const sorted = articles.sort((a, b) => new Date(b.date) - new Date(a.date));
        const featured = sorted.slice(0, 3);
        const recent   = sorted.slice(3, 7);

        // 피처드
        const featuredEl = document.getElementById('feed-featured');
        featured.forEach((a, i) => {
          featuredEl.innerHTML += `
            <a href="/articles/${a.slug}/" class="card ${i === 0 ? 'card--featured' : ''}">
              <img class="card-thumb" src="/articles/${a.slug}/thumb.webp" alt="${a.title}" loading="lazy">
              <div class="card-body">
                <p class="card-cat">${a.category}</p>
                <p class="card-title">${a.title}</p>
                <p class="card-meta">${a.author} · ${a.date} · ${a.read_time}</p>
              </div>
            </a>`;
        });

        // 최근
        const recentEl = document.getElementById('feed-recent');
        recent.forEach(a => {
          recentEl.innerHTML += `
            <a href="/articles/${a.slug}/" class="card">
              <img class="card-thumb" src="/articles/${a.slug}/thumb.webp" alt="${a.title}" loading="lazy">
              <div class="card-body">
                <p class="card-cat">${a.category}</p>
                <p class="card-title">${a.title}</p>
                <p class="card-meta">${a.author} · ${a.date}</p>
              </div>
            </a>`;
        });
      })
      .catch(() => {
        document.getElementById('feed-featured').innerHTML =
          '<p style="color:#6b7280;font-size:0.9rem;">아티클을 불러오는 중입니다.</p>';
      });
  </script>

</body>
</html>
