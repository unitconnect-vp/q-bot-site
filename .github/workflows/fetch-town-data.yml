name: Fetch & Build Town Data

on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 04:00 KST = 일요일 19:00 UTC
    - cron: '0 19 * * 0'

# 동시 실행 방지 — 진행 중인 잡이 끝나야 다음 잡 시작
# (cancel-in-progress: false → 새 잡은 큐에서 대기)
concurrency:
  group: fetch-town-data
  cancel-in-progress: false

jobs:
  fetch_and_build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch town data
        env:
          MOLIT_TRADE_KEY: ${{ secrets.MOLIT_TRADE_KEY }}
          MOLIT_RENT_KEY: ${{ secrets.MOLIT_RENT_KEY }}
          AIRKOREA_KEY: ${{ secrets.AIRKOREA_KEY }}
          HIRA_KEY: ${{ secrets.HIRA_KEY }}
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
          NEIS_KEY: ${{ secrets.NEIS_KEY }}
        run: python .github/scripts/fetch_town_data.py

      # [2026-05-05] 옵션 A 마이그레이션 진행 중 — 빌더 옛 sgg-grid 모델
      # 출력 방지를 위해 일시 비활성화. Phase 4 검증 후 if 제거.
      - name: Build town pages
        if: false
        run: python .github/scripts/build_town_page.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add town/
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -m "chore: update town data & pages ($(date -u +%Y-%m-%d))"
          # main이 워크플로우 진행 중 갱신됐을 수 있으니 rebase 후 push
          # 최대 3회 재시도 (다른 워크플로우와 경합 대비)
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "❌ push 3회 실패"
          exit 1

