name: Cloudflare Cache Purge

# 트리거:
# - main 브랜치에 사용자 노출 파일이 푸시될 때
# - GitHub UI에서 수동 실행 (Actions → Run workflow)
on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.json'
      - '**.xml'
      - '**.css'
      - '**.js'
      - '**.webp'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.svg'
      - 'CNAME'
      - 'robots.txt'
      - 'ads.txt'
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Everything
        run: |
          set -eo pipefail

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache")

          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP $CODE"
          echo "$BODY"

          if [ "$CODE" != "200" ]; then
            echo "::error::Cloudflare purge failed with HTTP $CODE"
            exit 1
          fi

          SUCCESS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::Cloudflare API returned success=false"
            exit 1
          fi

          echo "✓ Cache purged successfully"
