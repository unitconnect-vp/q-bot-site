name: Probe Academyinfo API
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Probe API
        env:
          ACADEMYINFO_KEY: ${{ secrets.ACADEMYINFO_KEY }}
        run: python .github/scripts/probe_academyinfo.py
