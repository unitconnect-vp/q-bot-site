name: KOSIS Debug
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: python .github/scripts/debug_kosis.py
