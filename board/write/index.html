<main class="qa-wrap" style="max-width:720px;">
<h1 class="qa-title">글 쓰기</h1>
<p class="qa-subtitle">투자·매수 추천, 매물 추천은 자본시장법·공인중개사법에 따라 금지됩니다.</p>

<form id="write-form" class="qa-form" novalidate>
<div class="qa-field">
<label class="qa-label" for="title">제목 <span style="color:#9ca3af;font-weight:400;">(2~80자)</span></label>
<input class="qa-input" type="text" id="title" name="title" required minlength="2" maxlength="80" autocomplete="off">
</div>
<div class="qa-field">
<label class="qa-label" for="body">본문 <span style="color:#9ca3af;font-weight:400;">(5~5000자)</span></label>
<textarea class="qa-input" id="body" name="body" required minlength="5" maxlength="5000" style="height:auto;min-height:280px;padding:14px 16px;line-height:1.7;resize:vertical;"></textarea>
</div>
<p class="qa-error" id="error" role="alert"></p>
<div style="display:flex;gap:12px;">
<a class="qa-btn qa-btn--ghost" href="/board/" style="text-decoration:none;flex:1;">취소</a>
<button class="qa-btn qa-btn--primary" type="submit" id="submit-btn" style="flex:2;">등록</button>
</div>
</form>

<script src="/assets/auth.js"></script>
<script>
(function() {
  if (!QLensAuth.isLoggedIn()) {
    window.location.replace('/auth/login/?next=' + encodeURIComponent('/board/write/'));
    return;
  }

  const $form = document.getElementById('write-form');
  const $title = document.getElementById('title');
  const $body = document.getElementById('body');
  const $error = document.getElementById('error');
  const $btn = document.getElementById('submit-btn');

  $form.addEventListener('submit', async function(e) {
    e.preventDefault();
    $error.textContent = '';
    const title = $title.value.trim();
    const body = $body.value;

    if (title.length < 2 || title.length > 80) {
      $error.textContent = '제목은 2~80자여야 합니다.';
      return;
    }
    if (body.length < 5 || body.length > 5000) {
      $error.textContent = '본문은 5~5000자여야 합니다.';
      return;
    }

    $btn.disabled = true;
    $btn.textContent = '등록 중…';
    try {
      const r = await QLensAuth.createPost({ title, body });
      if (r.status === 401) {
        QLensAuth.clearToken();
        window.location.replace('/auth/login/?next=' + encodeURIComponent('/board/write/'));
        return;
      }
      if (!r.ok) {
        $error.textContent = (r.data && r.data.error) || '등록에 실패했습니다.';
        $btn.disabled = false;
        $btn.textContent = '등록';
        return;
      }
      const id = r.data && r.data.id;
      window.location.replace('/board/post/?id=' + encodeURIComponent(id));
    } catch (err) {
      $error.textContent = '네트워크 오류가 발생했습니다.';
      $btn.disabled = false;
      $btn.textContent = '등록';
    }
  });
})();
</script>
