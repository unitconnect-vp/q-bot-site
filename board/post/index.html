<script src="/assets/auth.js"></script>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id') || '', 10);
  const selfUrl = '/board/post/?id=' + (id || '');

  if (!QLensAuth.isLoggedIn()) {
    window.location.replace('/auth/login/?next=' + encodeURIComponent(selfUrl));
    return;
  }

  const $loading = document.getElementById('loading');
  const $error = document.getElementById('error');
  const $post = document.getElementById('post');
  const $editWrap = document.getElementById('edit-form-wrap');

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(sec) {
    if (!sec) return '';
    const d = new Date(sec * 1000);
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') +
           ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  if (!Number.isFinite(id) || id <= 0) {
    $loading.style.display = 'none';
    $error.textContent = '잘못된 주소입니다.';
    $error.style.display = 'block';
    return;
  }

  let currentPost = null;

  function renderPost(p) {
    document.getElementById('post-title').textContent = p.title;
    document.getElementById('post-nickname').textContent = p.nickname || '익명';
    document.getElementById('post-date').textContent = fmtDate(p.created_at);
    if (p.updated_at && p.updated_at > p.created_at + 60) {
      document.getElementById('post-updated').textContent = ' (수정 ' + fmtDate(p.updated_at) + ')';
    } else {
      document.getElementById('post-updated').textContent = '';
    }
    document.getElementById('post-body').textContent = p.body;

    const $owner = document.getElementById('owner-actions');
    if (p.is_owner) {
      $owner.style.display = 'flex';
    } else {
      $owner.style.display = 'none';
    }
  }

  async function loadPost() {
    const r = await QLensAuth.getPost(id);
    if (r.status === 401) {
      QLensAuth.clearToken();
      window.location.replace('/auth/login/?next=' + encodeURIComponent(selfUrl));
      return;
    }
    $loading.style.display = 'none';
    if (r.status === 404) {
      $error.textContent = '삭제되었거나 없는 글입니다.';
      $error.style.display = 'block';
      return;
    }
    if (!r.ok || !r.data) {
      $error.textContent = '글을 불러오지 못했습니다.';
      $error.style.display = 'block';
      return;
    }
    currentPost = r.data;
    renderPost(currentPost);
    $post.style.display = 'block';
  }

  document.getElementById('edit-btn').addEventListener('click', function() {
    if (!currentPost) return;
    document.getElementById('edit-title').value = currentPost.title;
    document.getElementById('edit-body').value = currentPost.body;
    document.getElementById('edit-error').textContent = '';
    $post.style.display = 'none';
    $editWrap.style.display = 'block';
    window.scrollTo(0, 0);
  });

  document.getElementById('edit-cancel').addEventListener('click', function() {
    $editWrap.style.display = 'none';
    $post.style.display = 'block';
  });

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const $err = document.getElementById('edit-error');
    const $sub = document.getElementById('edit-submit');
    $err.textContent = '';
    const title = document.getElementById('edit-title').value.trim();
    const body = document.getElementById('edit-body').value;
    if (title.length < 2 || title.length > 80) { $err.textContent = '제목은 2~80자여야 합니다.'; return; }
    if (body.length < 5 || body.length > 5000) { $err.textContent = '본문은 5~5000자여야 합니다.'; return; }

    $sub.disabled = true;
    $sub.textContent = '저장 중…';
    const r = await QLensAuth.updatePost(id, { title, body });
    if (r.status === 401) {
      QLensAuth.clearToken();
      window.location.replace('/auth/login/?next=' + encodeURIComponent(selfUrl));
      return;
    }
    if (!r.ok) {
      $err.textContent = (r.data && r.data.error) || '저장에 실패했습니다.';
      $sub.disabled = false;
      $sub.textContent = '저장';
      return;
    }
    $editWrap.style.display = 'none';
    $post.style.display = 'block';
    await loadPost();
  });

  document.getElementById('delete-btn').addEventListener('click', async function() {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    const $btn = this;
    $btn.disabled = true;
    $btn.textContent = '삭제 중…';
    const r = await QLensAuth.deletePost(id);
    if (r.status === 401) {
      QLensAuth.clearToken();
      window.location.replace('/auth/login/?next=' + encodeURIComponent(selfUrl));
      return;
    }
    if (!r.ok) {
      alert((r.data && r.data.error) || '삭제에 실패했습니다.');
      $btn.disabled = false;
      $btn.textContent = '삭제';
      return;
    }
    window.location.replace('/board/');
  });

  loadPost();
})();
</script>
