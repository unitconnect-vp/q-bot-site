<script src="/assets/auth.js"></script>
<script>
(function() {
  // URL fragment에서 토큰 추출
  if (window.QLensAuth && QLensAuth.handleOAuthCallback()) {
    // 성공 → 메인 또는 next 파라미터로 redirect
    const stored = sessionStorage.getItem('qlens_oauth_next');
    sessionStorage.removeItem('qlens_oauth_next');
    window.location.replace(stored || '/');
  } else {
    // 실패 — fragment에 access_token 없음
    document.getElementById('loading').style.display = 'none';
    const block = document.getElementById('error-block');
    document.getElementById('error-msg').textContent = '인증 정보를 받지 못했습니다. 다시 시도해주세요.';
    block.style.display = 'block';
  }
})();
</script>
