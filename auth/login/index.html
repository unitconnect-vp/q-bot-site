<!DOCTYPE html>
<html lang="ko">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-04MMSE99PJ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-04MMSE99PJ');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Q렌즈</title>
<meta name="description" content="Q렌즈 로그인. 회원이 되시면 게임 기록·커뮤니티를 이용할 수 있습니다.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://q-bot.kr/auth/login/">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="site-header">
  <a href="/" class="site-logo"><h1 style="display:inline;font:inherit;margin:0;padding:0;">Q<span>-</span>Lens</h1></a>
  <nav class="site-nav">
    <a href="/">홈</a>
    <a href="/categories/realestate/">부동산</a>
    <a href="/categories/stocks/">주식</a>
    <a href="/play/">게임</a>
    <a href="/tools/">계산기</a>
  </nav>
</header>

<main class="qa-wrap">
  <h1 class="qa-title">로그인</h1>
  <p class="qa-subtitle">Q렌즈에 오신 것을 환영합니다.</p>

  <form class="qa-form" id="login-form" novalidate>
    <div class="qa-field">
      <label class="qa-label" for="email">이메일</label>
      <input class="qa-input" type="email" id="email" name="email" required autocomplete="email" placeholder="email@example.com">
    </div>
    <div class="qa-field">
      <label class="qa-label" for="password">비밀번호</label>
      <input class="qa-input" type="password" id="password" name="password" required autocomplete="current-password" minlength="8">
    </div>
    <p class="qa-error" id="error" role="alert"></p>
    <button class="qa-btn qa-btn--primary" type="submit" id="submit-btn">로그인</button>
  </form>

  <div class="qa-divider">또는</div>

  <button class="qa-btn qa-btn--ghost" type="button" id="google-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285f4" d="M22.5 12.27c0-.81-.07-1.59-.2-2.34H12v4.43h5.93a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.17z"/>
      <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.99.66-2.25 1.05-3.72 1.05-2.86 0-5.28-1.93-6.15-4.52H2.18v2.84A11 11 0 0 0 12 23z"/>
      <path fill="#fbbc04" d="M5.85 14.11A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.44.35-2.11V7.05H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.95l3.67-2.84z"/>
      <path fill="#ea4335" d="M12 5.38c1.62 0 3.07.56 4.21 1.65l3.15-3.15C17.46 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.67 2.84C6.72 7.31 9.14 5.38 12 5.38z"/>
    </svg>
    Google로 계속
  </button>

  <p class="qa-link">회원이 아니신가요? <a href="/auth/signup/">회원가입</a></p>
</main>

<footer class="site-footer">
  <div style="text-align:center;padding:32px 24px;color:#888;font-size:0.85rem;">
    <p>© 2026 Q-Lens · <a href="/" style="color:inherit;">q-bot.kr</a></p>
    <p style="margin-top:0.5rem;">
      <a href="/privacy/">개인정보처리방침</a> · <a href="/terms/">이용약관</a> · <a href="/about/">소개</a>
    </p>
  </div>
</footer>

<script src="/assets/auth.js"></script>
<script>
(function() {
  // 이미 로그인 → 메인으로
  if (window.QLensAuth && QLensAuth.isLoggedIn()) {
    window.location.replace('/');
    return;
  }

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error');
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = '로그인 중...';
    try {
      const email = e.target.email.value.trim();
      const password = e.target.password.value;
      await QLensAuth.login({email, password});
      const redirect = new URLSearchParams(location.search).get('next') || '/';
      window.location.replace(redirect);
    } catch (err) {
      errEl.textContent = err.message || '로그인에 실패했습니다.';
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  });

  document.getElementById('google-btn').addEventListener('click', function() {
    QLensAuth.googleLoginStart();
  });
})();
</script>
</body>
</html>
