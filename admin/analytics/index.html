<style>
  .ana-wrap { max-width: 1040px; margin: 0 auto; padding: 32px 16px 64px; font-size: 16px; }
  .ana-h1 { font-size: 2rem; font-weight: 700; margin: 0 0 6px; color: #1a1a1a; letter-spacing: -0.01em; }
  .ana-sub { font-size: 1rem; color: #6b7280; margin: 0 0 28px; }
  .ana-controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .ana-btn {
    padding: 12px 22px; border: 1px solid #e5e8eb; background: #fff; color: #1a1a1a;
    border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer;
  }
  .ana-btn.is-active { background: #3182f6; border-color: #3182f6; color: #fff; }
  .ana-totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .ana-card { background: #f9fafb; border: 1px solid #e5e8eb; border-radius: 6px; padding: 22px; }
  .ana-card-label { font-size: 1rem; color: #6b7280; margin: 0 0 10px; font-weight: 500; }
  .ana-card-value { font-size: 2.25rem; font-weight: 700; color: #1a1a1a; margin: 0; line-height: 1.1; letter-spacing: -0.01em; }
  .ana-card-sub { font-size: 0.875rem; color: #9ca3af; margin: 8px 0 0; }
  .ana-section { margin-bottom: 40px; }
  .ana-section h2 { font-size: 1.25rem; font-weight: 700; margin: 0 0 16px; color: #1a1a1a; }
  .ana-chart {
    height: 360px; background: #f9fafb; border: 1px solid #e5e8eb; border-radius: 6px;
    padding: 20px 16px 14px; display: grid; grid-auto-flow: column;
    grid-auto-columns: minmax(40px, 1fr); align-items: end; gap: 8px;
    overflow-x: auto; overflow-y: hidden;
  }
  .ana-bar-col {
    height: 100%; min-width: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .ana-bar-stack {
    flex: 1; width: 100%; max-width: 64px; min-width: 16px;
    display: flex; flex-direction: column; justify-content: flex-end;
    min-height: 0;
  }
  .ana-bar-pv { background: #3182f6; width: 100%; min-height: 2px; border-radius: 3px 3px 0 0; }
  .ana-bar-uv { background: #93b8f4; width: 100%; }
  .ana-bar-label { font-size: 0.875rem; color: #6b7280; white-space: nowrap; }
  .ana-bar-num { font-size: 0.875rem; color: #1a1a1a; font-weight: 600; min-height: 1.2em; }
  .ana-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
  .ana-table th, .ana-table td { padding: 12px 14px; border-bottom: 1px solid #e5e8eb; text-align: left; }
  .ana-table th { font-weight: 600; color: #6b7280; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .ana-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  .ana-table a { color: #1a1a1a; text-decoration: none; }
  .ana-table a:hover { text-decoration: underline; color: #3182f6; }
  .ana-empty { font-size: 1rem; color: #9ca3af; padding: 24px; text-align: center; }
  .ana-error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; padding: 14px 18px; border-radius: 6px; font-size: 1rem; }
  .ana-legend { display: flex; gap: 20px; font-size: 0.9375rem; color: #6b7280; margin-bottom: 12px; }
  .ana-legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
</style>
</head>

  <div id="loading" class="ana-empty">불러오는 중…</div>

  <div id="content" style="display:none;">
    <div class="ana-controls" id="range-controls">

<script src="/assets/auth.js"></script>
<script>
(function () {
  'use strict';

  const API = 'https://api.q-bot.kr';
  const $ = (sel) => document.querySelector(sel);
  const fmtNum = (n) => (n == null ? '0' : Number(n).toLocaleString('ko-KR'));

  function showError(msg) {
    $('#loading').style.display = 'none';
    const box = $('#error');
    box.textContent = msg;
    box.style.display = 'block';
  }

  async function fetchAnalytics(range) {
    const token = QLensAuth.getToken && QLensAuth.getToken();
    if (!token) {
      window.location.replace('/auth/login/?next=' + encodeURIComponent('/admin/analytics/'));
      return null;
    }
    const r = await fetch(API + '/admin/analytics?range=' + encodeURIComponent(range), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (r.status === 401) {
      window.location.replace('/auth/login/?next=' + encodeURIComponent('/admin/analytics/'));
      return null;
    }
    if (r.status === 403) {
      showError('접근 권한이 없습니다. 관리자 이메일 화이트리스트(ADMIN_EMAILS)를 확인하세요.');
      return null;
    }
    if (!r.ok) {
      showError('분석 데이터 조회 실패 (HTTP ' + r.status + ')');
      return null;
    }
    return r.json();
  }

  function renderTotals(t, days) {
    const items = [
      { label: 'PV', value: fmtNum(t.pv), sub: days + '일 누적' },
      { label: 'UV', value: fmtNum(t.uv), sub: '순방문자' },
      { label: '세션', value: fmtNum(t.sessions), sub: '30분 idle 기준' },
      { label: '로그인 PV', value: fmtNum(t.logged_in_pv), sub: '회원 기여' }
    ];
    $('#totals').innerHTML = items.map(i =>
      '<div class="ana-card">' +
        '<p class="ana-card-label">' + i.label + '</p>' +
        '<p class="ana-card-value">' + i.value + '</p>' +
        '<p class="ana-card-sub">' + i.sub + '</p>' +
      '</div>'
    ).join('');
  }

  function renderChart(daily) {
    const chart = $('#chart');
    if (!daily || daily.length === 0) {
      chart.innerHTML = '<p class="ana-empty" style="margin:auto;">데이터 없음</p>';
      return;
    }
    // 오래된 → 최신 순으로 표시
    const rows = daily.slice().reverse();
    const max = Math.max.apply(null, rows.map(r => r.pv || 0)) || 1;

    // 막대 높이는 stack(flex:1) 내부 % 기반. chart는 grid로 N개 컬럼 균등 분배.
    chart.innerHTML = rows.map(r => {
      const pvPct = max > 0 ? ((r.pv || 0) / max) * 100 : 0;
      const uvPct = max > 0 ? ((r.uv || 0) / max) * 100 : 0;
      const md = (r.date_kr || '').slice(5);
      return (
        '<div class="ana-bar-col" title="' + r.date_kr + ' · PV ' + r.pv + ' / UV ' + r.uv + '">' +
          '<span class="ana-bar-num">' + (r.pv || 0) + '</span>' +
          '<div class="ana-bar-stack">' +
            '<div class="ana-bar-uv" style="height:' + uvPct + '%;"></div>' +
            '<div class="ana-bar-pv" style="height:' + pvPct + '%;"></div>' +
          '</div>' +
          '<span class="ana-bar-label">' + md + '</span>' +
        '</div>'
      );
    }).join('');
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderPathsTable(rows) {
    const tbody = $('#paths-table tbody');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="ana-empty">데이터 없음</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const safePath = escapeHtml(r.path);
      return '<tr>' +
        '<td><a href="' + safePath + '" target="_blank" rel="noopener">' + safePath + '</a></td>' +
        '<td class="num">' + fmtNum(r.pv) + '</td>' +
        '<td class="num">' + fmtNum(r.uv) + '</td>' +
      '</tr>';
    }).join('');
  }

  function renderReferrersTable(rows) {
    const tbody = $('#referrers-table tbody');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="ana-empty">외부 유입 없음</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r =>
      '<tr>' +
        '<td>' + escapeHtml(r.referrer_host) + '</td>' +
        '<td class="num">' + fmtNum(r.pv) + '</td>' +
        '<td class="num">' + fmtNum(r.uv) + '</td>' +
      '</tr>'
    ).join('');
  }

  async function load(range) {
    $('#loading').style.display = 'block';
    $('#content').style.display = 'none';
    $('#error').style.display = 'none';

    const data = await fetchAnalytics(range);
    if (!data) return;

    renderTotals(data.totals || {}, data.range_days);
    renderChart(data.daily || []);
    renderPathsTable(data.top_paths || []);
    renderReferrersTable(data.top_referrers || []);

    $('#loading').style.display = 'none';
    $('#content').style.display = 'block';
  }

  function bindControls() {
    document.querySelectorAll('#range-controls .ana-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#range-controls .ana-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        load(btn.dataset.range);
      });
    });
  }

  async function ensureToken() {
    if (!window.QLensAuth) return false;
    if (QLensAuth.isLoggedIn()) return true;
    // refresh_token 쿠키가 있으면 access_token 재발급 시도
    try { await QLensAuth.refresh(); return QLensAuth.isLoggedIn(); }
    catch (e) { return false; }
  }

  (async function init() {
    const ok = await ensureToken();
    if (!ok) {
      window.location.replace('/auth/login/?next=' + encodeURIComponent('/admin/analytics/'));
      return;
    }
    bindControls();
    await load('7d');
  })();
})();
</script>
</body>
