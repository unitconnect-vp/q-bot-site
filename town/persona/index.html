<script>
/*!
 * persona_score_v3.js
 * 거주지 의사결정 도구 — 페르소나 점수 함수 (브라우저 사이드)
 */
const WEIGHTS = {
  '신혼':     { price_value: 25, rent_value: 15, school_density: 5, biz_convenience: 10, medical_access: 10, environment: 20, population_vitality: 10, life_stability: 0 },
  '자녀가족': { price_value: 15, rent_value: 10, school_density: 30, biz_convenience: 5, medical_access: 15, environment: 15, population_vitality: 0, life_stability: 10 },
  '은퇴':     { price_value: 15, rent_value: 0,  school_density: 0,  biz_convenience: 5, medical_access: 35, environment: 20, population_vitality: 0, life_stability: 25 },
  '1인가구':  { price_value: 0,  rent_value: 35, school_density: 0,  biz_convenience: 20, medical_access: 15, environment: 15, population_vitality: 10, life_stability: 0 },
};

const PERSONA_DEFAULT_T = { '신혼': 50, '자녀가족': 60, '은퇴': 40, '1인가구': 70 };
const UNAVAILABLE = new Set(['biz_convenience', 'life_stability']);
const INVERSE_METRICS = new Set(['price_value', 'rent_value', 'environment']);

const populationGroup = (pop) => {
  if (pop == null) return 'X';
  if (pop >= 300000) return 'A';
  if (pop >= 100000) return 'B';
  return 'C';
};
const groupBonus = (t, group) => {
  const delta = (t - 50) / 50;
  if (group === 'A') return delta * 15;
  if (group === 'B') return delta * 5;
  if (group === 'C') return -delta * 15;
  return 0;
};

class PersonaScoreEngine {
  constructor(records) {
    this.records = records;
    this._precompute();
  }
  _extractMetrics(record) {
    const s = record.sections || {};
    const pop = (s.population || {}).sgg_total || 0;
    const trade = s.real_estate_trade || {};
    const rent = s.real_estate_rent || {};
    const env = s.environment || {};
    const med = s.medical || {};
    const edu = s.education || {};
    let pm25 = null;
    const guSt = env.gu_station || env.sigungu_station;
    if (guSt && typeof guSt === 'object' && guSt.pm25 != null) pm25 = guSt.pm25;
    else if (env.seoul_avg && typeof env.seoul_avg === 'object') pm25 = env.seoul_avg.pm25;
    else if (env.sido_avg && typeof env.sido_avg === 'object') pm25 = env.sido_avg.pm25;
    let vitality = null;
    const pageAge = s.population_age;
    if (pageAge && pageAge.shares) {
      const sh = pageAge.shares;
      const sum = (sh['20s'] || 0) + (sh['30s'] || 0) + (sh['40s'] || 0);
      if (sum > 0) vitality = sum;
    }
    return {
      population: pop,
      price_value: trade.median_price_per_pyeong_man ?? null,
      rent_value: rent.median_jeonse_man ?? null,
      school_density: pop ? (edu.sgg_count || 0) / pop * 10000 : null,
      medical_access: pop ? (med.sgg_count || 0) / pop * 10000 : null,
      environment: pm25,
      population_vitality: vitality,
    };
  }
  _precompute() {
    this.metrics = new Map();
    this.groupMap = new Map();
    for (const r of this.records) {
      const m = this._extractMetrics(r);
      this.metrics.set(r.slug, m);
      this.groupMap.set(r.slug, populationGroup(m.population));
    }
    this.groupDist = { A: {}, B: {}, C: {}, X: {} };
    const keys = ['price_value', 'rent_value', 'school_density', 'medical_access', 'environment', 'population_vitality'];
    for (const r of this.records) {
      const m = this.metrics.get(r.slug);
      const g = this.groupMap.get(r.slug);
      for (const k of keys) {
        if (m[k] == null) continue;
        if (!this.groupDist[g][k]) this.groupDist[g][k] = [];
        this.groupDist[g][k].push(m[k]);
      }
    }
    for (const g of Object.keys(this.groupDist)) {
      for (const k of Object.keys(this.groupDist[g])) {
        this.groupDist[g][k].sort((a, b) => a - b);
      }
    }
    this.percentiles = new Map();
    for (const r of this.records) {
      const m = this.metrics.get(r.slug);
      const g = this.groupMap.get(r.slug);
      const p = {};
      for (const k of keys) {
        const sortedVals = this.groupDist[g][k] || [];
        if (m[k] == null || sortedVals.length === 0) { p[k] = null; continue; }
        let lo = 0, hi = sortedVals.length;
        while (lo < hi) {
          const mid = (lo + hi) >>> 1;
          if (sortedVals[mid] < m[k]) lo = mid + 1; else hi = mid;
        }
        let pct = lo / sortedVals.length * 100;
        if (INVERSE_METRICS.has(k)) pct = 100 - pct;
        p[k] = Math.round(pct * 10) / 10;
      }
      this.percentiles.set(r.slug, p);
    }
  }
  score(slug, persona, t) {
    const p = this.percentiles.get(slug);
    if (!p) return null;
    const weights = WEIGHTS[persona];
    let activeTotal = 0, weightedSum = 0;
    for (const [k, w] of Object.entries(weights)) {
      if (w === 0 || UNAVAILABLE.has(k)) continue;
      const pct = p[k];
      if (pct == null) continue;
      weightedSum += pct * w;
      activeTotal += w;
    }
    if (activeTotal === 0) return null;
    const baseScore = weightedSum / activeTotal;
    const group = this.groupMap.get(slug);
    const bonus = groupBonus(t, group);
    const final = Math.max(0, Math.min(100, baseScore + bonus));
    return Math.round(final * 10) / 10;
  }
  contributions(slug, persona, t) {
    const p = this.percentiles.get(slug);
    if (!p) return [];
    const weights = WEIGHTS[persona];
    let activeTotal = 0;
    for (const [k, w] of Object.entries(weights)) {
      if (w === 0 || UNAVAILABLE.has(k) || p[k] == null) continue;
      activeTotal += w;
    }
    const contribs = [];
    for (const [k, w] of Object.entries(weights)) {
      if (w === 0 || UNAVAILABLE.has(k)) continue;
      const pct = p[k];
      if (pct == null) continue;
      const normalizedW = w / activeTotal;
      contribs.push({
        key: k, percentile: pct,
        weight: Math.round(normalizedW * 100 * 10) / 10,
        contribution: Math.round(pct * normalizedW * 10) / 10,
      });
    }
    return contribs.sort((a, b) => b.contribution - a.contribution);
  }
  ranking(persona, t, limit = 20) {
    const scored = [];
    for (const r of this.records) {
      const s = this.score(r.slug, persona, t);
      if (s == null) continue;
      scored.push({ slug: r.slug, name: r.name, sido: r.sido_name, group: this.groupMap.get(r.slug), score: s });
    }
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, limit);
  }
}

// =================== UI ===================
const CHIP_COLORS = ['#3182f6', '#16a34a', '#f59e0b', '#a855f7', '#ec4899'];
const PERSONA_LABELS = {
  '신혼': { tDefault: 50 }, '자녀가족': { tDefault: 60 },
  '은퇴': { tDefault: 40 }, '1인가구': { tDefault: 70 },
};
const KEY_LABELS = {
  price_value: '매매가 적정성', rent_value: '전월세 가성비',
  school_density: '학교 밀도', medical_access: '의료 접근성',
  environment: '환경 (PM2.5)', population_vitality: '인구 활력',
};

let DATA = null;
let RECORDS = {};
let engine = null;
let state = {
  persona: '자녀가족',
  t: 60,
  selected: [],
};

function fmtMan(v) {
  if (v == null) return '—';
  if (v >= 10000) return (v / 10000).toFixed(1) + '억';
  return v.toLocaleString() + '만';
}
function fmtPm(v) { return v == null ? '—' : v + ''; }
function fmtCount(v) { return v == null ? '—' : v.toLocaleString(); }
function fmtPop(v) {
  if (v == null) return '—';
  if (v >= 10000) return Math.round(v / 1000) / 10 + '만';
  return v.toLocaleString();
}

async function init() {
  const shell = document.getElementById('app-shell');
  try {
    const res = await fetch('/data/town-records.json', { cache: 'force-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
  } catch (e) {
    shell.innerHTML = '<div class="error-state">데이터를 불러오지 못했습니다 (' + e.message + '). 잠시 후 새로고침해 주세요.</div>';
    return;
  }
  for (const r of DATA.records) RECORDS[r.slug] = r;
  engine = new PersonaScoreEngine(DATA.records);

  // template 주입
  const tpl = document.getElementById('tpl-app');
  shell.innerHTML = '';
  shell.appendChild(tpl.content.cloneNode(true));

  setupPersona();
  setupSlider();
  setupAddRow();

  // 기본 선택: 강남
  if (RECORDS['seoul/gangnam']) addSlug('seoul/gangnam');
  render();
}

function setupPersona() {
  const personaRow = document.getElementById('persona-row');
  for (const [name, meta] of Object.entries(PERSONA_LABELS)) {
    const el = document.createElement('div');
    el.className = 'persona-card' + (name === state.persona ? ' active' : '');
    el.innerHTML = name + '<div class="persona-default-t">기본 t=' + meta.tDefault + '</div>';
    el.onclick = () => {
      state.persona = name;
      state.t = meta.tDefault;
      document.getElementById('slider').value = state.t;
      document.getElementById('slider-val').textContent = state.t;
      [...personaRow.children].forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      render();
    };
    personaRow.appendChild(el);
  }
}

function setupSlider() {
  document.getElementById('slider').addEventListener('input', (e) => {
    state.t = parseInt(e.target.value);
    document.getElementById('slider-val').textContent = state.t;
    render();
  });
}

function setupAddRow() {
  const sidoSel = document.getElementById('sido-select');
  const sggSel = document.getElementById('sgg-select');
  const addBtn = document.getElementById('add-btn');

  // 시도 옵션
  sidoSel.innerHTML = '<option value="">시도 선택</option>';
  for (const s of DATA.sido_list) {
    const opt = document.createElement('option');
    opt.value = s.code;
    opt.textContent = s.name + ' (' + s.count + ')';
    sidoSel.appendChild(opt);
  }

  sidoSel.addEventListener('change', () => {
    const code = sidoSel.value;
    sggSel.innerHTML = '<option value="">시군구 선택</option>';
    addBtn.disabled = true;
    if (!code) return;
    const filtered = DATA.records
      .filter(r => r.sido_code === code)
      .sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    for (const r of filtered) {
      const opt = document.createElement('option');
      opt.value = r.slug;
      opt.textContent = r.name;
      sggSel.appendChild(opt);
    }
  });

  sggSel.addEventListener('change', () => {
    addBtn.disabled = !sggSel.value || state.selected.includes(sggSel.value) || state.selected.length >= 5;
  });

  addBtn.addEventListener('click', () => {
    if (sggSel.value) {
      addSlug(sggSel.value);
      sggSel.value = '';
      addBtn.disabled = true;
    }
  });
}

function addSlug(slug) {
  if (state.selected.includes(slug)) return;
  if (state.selected.length >= 5) return;
  state.selected.push(slug);
  render();
}
function removeSlug(slug) {
  state.selected = state.selected.filter(s => s !== slug);
  render();
}

function render() {
  // 칩
  const chipRow = document.getElementById('chip-row');
  chipRow.innerHTML = '';
  if (state.selected.length === 0) {
    chipRow.innerHTML = '<div class="chip-empty">아직 선택된 동네가 없습니다.</div>';
  } else {
    state.selected.forEach((slug, i) => {
      const r = RECORDS[slug];
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.style.background = CHIP_COLORS[i];
      chip.innerHTML = (r ? r.name_full : slug) + '<span class="chip-x" title="제거">×</span>';
      chip.querySelector('.chip-x').onclick = () => removeSlug(slug);
      chipRow.appendChild(chip);
    });
  }
  // 5개 도달 시 select 차단
  const sggSel = document.getElementById('sgg-select');
  const addBtn = document.getElementById('add-btn');
  if (sggSel) addBtn.disabled = !sggSel.value || state.selected.includes(sggSel.value) || state.selected.length >= 5;

  // 비교 영역
  const empty = document.getElementById('compare-empty');
  const content = document.getElementById('compare-content');
  if (state.selected.length === 0) {
    empty.style.display = 'block';
    content.style.display = 'none';
  } else {
    empty.style.display = 'none';
    content.style.display = 'block';
    renderCompareBars();
    renderCompareTable();
    renderContributions();
  }

  renderRanking();
}

function renderCompareBars() {
  const wrap = document.getElementById('cmp-bars');
  wrap.innerHTML = '';
  const scored = state.selected.map((slug, i) => {
    const r = RECORDS[slug];
    return {
      slug, name: r ? r.name_full : slug,
      score: engine.score(slug, state.persona, state.t),
      color: CHIP_COLORS[i],
    };
  });
  for (const s of scored) {
    const row = document.createElement('div');
    row.className = 'cmp-bar-row';
    const w = s.score == null ? 0 : s.score;
    row.innerHTML = '<div class="cmp-bar-name" title="' + s.name + '">' + s.name + '</div>'
      + '<div class="cmp-bar-track"><div class="cmp-bar-fill" style="width:' + w + '%;background:' + s.color + ';"></div></div>'
      + '<div class="cmp-bar-num" style="color:' + s.color + ';">' + (s.score == null ? '—' : s.score.toFixed(1)) + '</div>';
    wrap.appendChild(row);
  }
}

function renderCompareTable() {
  const table = document.getElementById('cmp-table');
  // 행: 동네, 열: 지표
  const cols = [
    { k: 'population', label: '인구', fmt: fmtPop, lower_is_better: false },
    { k: 'price', label: '평당가(만원)', fmt: fmtCount, lower_is_better: true },
    { k: 'jeonse', label: '전세 중위(만원)', fmt: fmtCount, lower_is_better: true },
    { k: 'medical', label: '의료기관', fmt: fmtCount, lower_is_better: false },
    { k: 'school', label: '학교', fmt: fmtCount, lower_is_better: false },
    { k: 'pm25', label: 'PM2.5', fmt: fmtPm, lower_is_better: true },
  ];

  const rows = state.selected.map((slug, i) => {
    const r = RECORDS[slug];
    if (!r) return null;
    const s = r.sections || {};
    const env = s.environment || {};
    let pm = null;
    const guSt = env.gu_station || env.sigungu_station;
    if (guSt && typeof guSt === 'object' && guSt.pm25 != null) pm = guSt.pm25;
    else if (env.sido_avg && env.sido_avg.pm25 != null) pm = env.sido_avg.pm25;
    return {
      slug, color: CHIP_COLORS[i], name: r.name_full,
      population: (s.population || {}).sgg_total,
      price: (s.real_estate_trade || {}).median_price_per_pyeong_man,
      jeonse: (s.real_estate_rent || {}).median_jeonse_man,
      medical: (s.medical || {}).sgg_count,
      school: (s.education || {}).sgg_count,
      pm25: pm,
    };
  }).filter(Boolean);

  // 각 컬럼별 best/worst slug 찾기 (값이 있는 것만)
  const bestMap = {}, worstMap = {};
  for (const c of cols) {
    const vals = rows.map(r => r[c.k]).filter(v => v != null);
    if (vals.length < 2) continue;
    const best = c.lower_is_better ? Math.min(...vals) : Math.max(...vals);
    const worst = c.lower_is_better ? Math.max(...vals) : Math.min(...vals);
    bestMap[c.k] = best;
    worstMap[c.k] = worst;
  }

  let html = '<thead><tr><th>동네</th>';
  for (const c of cols) html += '<th>' + c.label + '</th>';
  html += '</tr></thead><tbody>';

  for (const r of rows) {
    html += '<tr><td class="name-cell"><span class="swatch" style="background:' + r.color + '"></span>' + r.name + '</td>';
    for (const c of cols) {
      const v = r[c.k];
      let cls = '';
      if (v != null && bestMap[c.k] != null) {
        if (v === bestMap[c.k]) cls = 'best';
        else if (v === worstMap[c.k]) cls = 'worst';
      }
      html += '<td class="' + cls + '">' + c.fmt(v) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

function renderContributions() {
  const block = document.getElementById('contrib-block');
  if (state.selected.length === 0) { block.style.display = 'none'; return; }
  const slug = state.selected[0];
  const r = RECORDS[slug];
  const contribs = engine.contributions(slug, state.persona, state.t);
  block.style.display = 'block';
  block.querySelector('.contributions-block-title').textContent = (r ? r.name_full : slug) + ' — 지표별 기여도';
  const wrap = document.getElementById('contributions');
  wrap.innerHTML = '';
  for (const c of contribs) {
    const row = document.createElement('div');
    row.className = 'contrib-row';
    const lowClass = c.percentile < 30 ? ' low' : '';
    row.innerHTML = '<div class="contrib-key">' + (KEY_LABELS[c.key] || c.key) + '</div>'
      + '<div class="contrib-bar-wrap"><div class="contrib-bar' + lowClass + '" style="width:' + c.percentile + '%"></div></div>'
      + '<div class="contrib-num">+' + c.contribution.toFixed(1) + '</div>';
    wrap.appendChild(row);
  }
}

function renderRanking() {
  const ranking = engine.ranking(state.persona, state.t, 10);
  const rWrap = document.getElementById('ranking');
  rWrap.innerHTML = '';
  for (const [i, r] of ranking.entries()) {
    const row = document.createElement('div');
    row.className = 'rank-item';
    const isAdded = state.selected.includes(r.slug);
    const isFull = state.selected.length >= 5 && !isAdded;
    const btnLabel = isAdded ? '✓ 추가됨' : (isFull ? '5개 가득' : '+ 추가');
    const btnClass = (isAdded || isFull) ? 'rank-add added' : 'rank-add';
    row.innerHTML = '<div class="rank-num">' + (i + 1) + '</div>'
      + '<div><div class="rank-name">' + r.name + '</div><div class="rank-meta">' + r.sido + ' · 그룹 ' + r.group + '</div></div>'
      + '<button class="' + btnClass + '" ' + ((isAdded || isFull) ? 'disabled' : '') + '>' + btnLabel + '</button>'
      + '<div class="rank-score">' + r.score.toFixed(1) + '</div>';
    if (!isAdded && !isFull) {
      row.querySelector('.rank-add').onclick = (ev) => {
        ev.stopPropagation();
        addSlug(r.slug);
      };
    }
    rWrap.appendChild(row);
  }
}

init();
</script>
</body>
</html>
